# Sample config.yml file

# Binance API base URL (default: https://api1.binance.com)
# Use https://testnet.binance.vision for testnet
base-url: "https://api1.binance.com"
data-dir: ".binance-bot"

historical-prices:
  period: 100
  interval: "1m"
refresh-interval: 10  # seconds between price checks (default: 10)

order-management:
  buy-timeout-minutes: 20     # cancel unfilled buy limit orders after this many minutes; 0 disables timeout
  sell-timeout-minutes: 20    # cancel unfilled sell limit orders after this many minutes; 0 disables timeout
  partial-fill-action: "keep" # keep or reverse partially filled timeout orders
  poll-interval-secs: 5       # order status polling cadence

fees:
  enabled: true
  default-taker-pct: 0.1      # fallback taker fee percent when Binance fee lookup is unavailable
  buffer-pct: 0.05            # extra target buffer subtracted from take-profit decisions
  buy-back-buffer-pct: 0.2    # percent withheld when sizing round-trip orders & retrying after insufficient balance (default 0.2)

tendency:
  interval: "3m"
  # period: 0           # frames fetched for trading-interval tendency (0 → historical-prices.period)
  # fast-length: 0      # DEMA length (0 → 9)
  # slow-length: 0      # EMA length (0 → period)
  # confirm-bars: 0     # require last N bars to agree (0/1 → single-bar, current behavior)
  htf-enabled: false     # higher-timeframe trend gate (blocks bull entry when HTF trend is down, bear entry when HTF trend is up)
  htf-interval: "15m"   # interval used for higher-timeframe tendency check
  # htf-period: 0       # frames fetched for HTF tendency (0 → tendency.period)
  # htf-fast-length: 0  # HTF DEMA length (0 → fast-length)
  # htf-slow-length: 0  # HTF EMA length (0 → slow-length)
  # htf-confirm-bars: 0 # HTF bars to confirm direction (0 → confirm-bars)
indicators:
  rsi:
    interval: "5m"
    length: 14
    upper-limit: 70
    middle-limit: 50
    lower-limit: 30
  dema:
    length: 9
  macd:
    fast-length: 12
    slow-length: 26
    signal-length: 9
  bollinger-bands:
    length: 20
    multiplier: 2.0
  atr:
    period: 14
  adx:
    period: 14
    threshold: 25     # minimum ADX for trade entry
  volume:
    ma-period: 20     # volume moving average period
trailing-stop:
  enabled: true
  activation-pct: 1.5  # activate after 1.5% profit
  trailing-pct: 1.0    # trail by 1.0% from peak

# Scalp mode: relaxed entry conditions for high-frequency micro-trading
# When enabled, uses a scoring system (min-score out of 6 signals) instead of
# requiring ALL entry conditions to be true simultaneously.
scalp-mode:
  enabled: false
  min-score: 3           # minimum bullish signals out of 6 to trigger entry
  post-buy-delay: 30     # seconds to wait after fill before exit monitoring
  inter-op-delay: 60     # seconds to wait between completed operations
  require-rsi-exit: true # require RSI declining/rising for take-profit
  sl-cooldown: false     # exponential backoff after consecutive stop-losses
  max-consecutive-sl: 2  # SL hits before cooldown starts
  cooldown-base-secs: 60 # base cooldown seconds (doubles each consecutive SL)
  atr-stop-loss: false   # ATR-based dynamic stop-loss floor
  atr-multiplier: 1.5    # SL = max(configured, atrMultiplier × ATR%)

# AI multi-agent configuration
# API keys are read from environment variables:
#   OPENAI_API_KEY, DEEPSEEK_API_KEY, ANTHROPIC_API_KEY
ai:
  enabled: true
  providers:
    openai:
      model: "gpt-4o-mini"        # free-tier friendly
    deepseek:
      model: "deepseek-chat"       # free tier available
    claude:
      model: "claude-3-5-haiku-20241022"  # most affordable Claude
  min-confidence: 0.5              # entries require matching AI signal at or above this confidence

# Top gainers monitor configuration
top-gainers:
  quote-asset: "USDT"              # filter pairs ending with this asset
  limit: 20                        # number of top gainers to display
  poll-interval: 60                # seconds between each poll
  min-volume: 1000000              # minimum 24h quote volume to include
  exclude-symbols:                 # symbols to exclude from results
    - "USDCUSDT"

rotation:
  bridge-asset: "USDT"
  current-asset: "BTC"              # initial asset; persisted state overrides this after first run
  supported-assets:
    - "BTC"
    - "ETH"
    - "SOL"
    - "XRP"
    - "DOGE"
  scout-multiplier: 5               # fee multiplier used by relative-ratio scout mode
  scout-margin-pct: 0.8             # used when use-margin is true
  use-margin: false
  scout-sleep-seconds: 5
  dry-run: true                     # set false only after testing with small balances
  max-jumps: 0                      # 0 means run until stopped
  min-notional-buffer: 1.01

backtest:
  initial-balance: 1000
  fee-pct: 0.1

api:
  address: "127.0.0.1:8080"
