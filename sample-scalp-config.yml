# Sample config for HIGH-FREQUENCY SCALP TRADING on volatile crypto tickers
# Optimized for multiple micro-transactions per day (e.g. PEPE/USDT, SHIB/USDT, DOGE/USDT)
#
# CLI example:
#   binance-bot bt -t PEPE/USDT -a 50 --sl 1.0 --tp 0.5 -b 0.9999 -s 1.0001 -rp 8 -ra 0 -o 500 -f scalp-config.yml

# Binance API base URL (default: https://api1.binance.com)
# Use https://testnet.binance.vision for testnet
base-url: "https://api1.binance.com"
data-dir: ".binance-bot"

historical-prices:
  period: 50            # shorter lookback → faster indicator response
  interval: "1m"        # 1-minute candles for rapid signals

refresh-interval: 10    # poll every 10 seconds for faster reaction to market changes

order-management:
  buy-timeout-minutes: 5
  sell-timeout-minutes: 5
  partial-fill-action: "keep"
  poll-interval-secs: 2

fees:
  enabled: true
  default-taker-pct: 0.1
  buffer-pct: 0.05
  buy-back-buffer-pct: 0.2

tendency:
  interval: "1m"        # fast tendency on 1m (was 3m)
  period: 60            # ~1h of 1m candles for trading-interval tendency (decoupled from historical-prices.period)
  fast-length: 5        # DEMA(5) — reactive fast MA
  slow-length: 20       # EMA(20) — short slow MA for snappy crossovers
  confirm-bars: 2       # require 2 consecutive bars agreeing to confirm direction (anti-flicker)
  htf-enabled: true     # block entries when 5m trend opposes direction
  htf-interval: "5m"    # higher-timeframe gate for scalp mode
  htf-period: 80        # ~6.5h of 5m candles
  htf-fast-length: 9    # HTF DEMA(9)
  htf-slow-length: 30   # HTF EMA(30) — regime filter, still reactive vs old EMA(period)
  htf-confirm-bars: 1   # HTF gate flips fast on a single confirmed bar

indicators:
  rsi:
    interval: "1m"      # fast RSI timeframe (was 5m)
    length: 7           # shorter RSI period = more reactive (was 14)
    upper-limit: 65     # more permissive entry threshold (was 70)
    middle-limit: 50
    lower-limit: 35     # wider entry zone (was 30)
    smooth-length: 3    # 3-bar SMA smoothing on RSI to reduce flicker on 1m candles
  dema:
    length: 5           # faster DEMA (was 9)
  macd:
    fast-length: 6      # faster MACD (was 12)
    slow-length: 13     # (was 26)
    signal-length: 5    # (was 9)
    consecutive-bars: 2 # require 2 consecutive bars of histogram direction before MACD signal counts
    min-separation: 0.002         # MACD signal only fires after histogram was at least this far from zero (in the prior direction) within the lookback — filters out flat noise
    min-separation-lookback: 20   # bars to scan for the prior peak separation
  bollinger-bands:
    length: 10          # tighter bands = more entry signals (was 20)
    multiplier: 1.5     # narrower bands (was 2.0)
  atr:
    period: 7           # shorter ATR (was 14)
  adx:
    period: 7           # shorter ADX (was 14)
    threshold: 15       # accept weaker trends (was 25)
  volume:
    ma-period: 10       # shorter volume MA (was 20)

trailing-stop:
  enabled: true
  activation-pct: 0.5   # activate trail earlier (was 1.5%)
  trailing-pct: 0.3     # tight trail from peak (was 1.0%)

# Scalp mode: relaxed entry using scoring instead of all-conditions-must-match.
# This sample turns on most v0.14.0 quality knobs — disable them individually
# if you want to A/B test the impact of each.
scalp-mode:
  enabled: true
  min-score: 4              # weighted scoring is on → use a slightly higher bar
  post-buy-delay: 5         # seconds after fill before monitoring exit
  inter-op-delay: 10        # seconds between completed ops
  require-rsi-exit: false   # don't require RSI declining for take-profit
  sl-cooldown: true         # enable exponential backoff after consecutive SL hits
  max-consecutive-sl: 2
  cooldown-base-secs: 60    # base cooldown: 60s → 120s → 240s (capped at 600s)
  atr-stop-loss: true       # dynamically widen SL based on current volatility
  atr-multiplier: 1.5       # SL = max(configured, 1.5 × ATR%)
  # --- v0.14.0 indicator overhaul ---
  weighted-scoring: true        # MACD/RSI/BB ×2, divergence ×3
  bb-squeeze-enabled: true      # award a bonus when BB width compresses (energy build-up)
  bb-squeeze-ratio: 0.85
  bb-squeeze-window: 20
  volume-strong-multiplier: 1.5 # bonus when current volume > 1.5 × MA
  divergence-enabled: true      # ×3 bonus on RSI divergence
  divergence-lookback: 14
  divergence-swing-pad: 2
  fast-trend-gate: true         # accept tendency aligned OR MACD line on correct side of zero
  tp-atr-multiplier: 1.2        # TP = max(--tp, 1.2 × ATR%) — scales with volatility
  sl-atr-multiplier: 1.5        # SL = max(--sl, 1.5 × ATR%) — overrides atr-multiplier
  time-stop-bars: 15            # close stale flat positions after 15 minutes (15 × 1m bars)
  breakeven-atr-mult: 1.0       # pin SL to entry once peak P&L ≥ 1.0 × ATR%
  min-atr-pct: 0.05             # skip entries below 0.05% ATR (dead market)
  max-atr-pct: 3.0              # skip entries above 3.0% ATR (chaotic spike)
  macd-peak-exit: true          # exit profitable trade when MACD histogram rolls over
  recent-extreme-bars: 30       # block BULL entries within 0.1×ATR of last 30-bar high (BEAR mirror)
  # --- v0.20 exit-state-machine rework (bar = closed kline of historical-prices.interval) ---
  max-hold-bars: 60             # hard time exit: close after 60 closed bars (1h on 1m) regardless of P&L
  breakeven-trail-atr-mult: 1.0 # after break-even, trail exit floor at peak − 1.0 × ATR% (lets winners run to TP)
  reentry-cooldown-bars: 3      # wait 3 closed bars after any exit before re-entering

# AI — disabled by default for scalp mode to avoid adding LLM latency to fast entry/exit paths.
# Enable only if slower decisions are acceptable and you want explicit AI approval before entries.
ai:
  enabled: false
  providers:
    openai:
      model: "gpt-4o-mini"
    deepseek:
      model: "deepseek-chat"
    claude:
      model: "claude-3-5-haiku-20241022"
  min-confidence: 0.5    # entries require matching AI signal at or above this confidence when AI is enabled

top-gainers:
  quote-asset: "USDT"
  limit: 20
  poll-interval: 30
  min-volume: 5000000    # higher volume filter for liquid scalp targets
  exclude-symbols:
    - "USDCUSDT"

rotation:
  bridge-asset: "USDT"
  current-asset: "DOGE"
  supported-assets:
    - "DOGE"
    - "PEPE"
    - "SHIB"
    - "XRP"
  scout-multiplier: 5
  scout-margin-pct: 0.8
  use-margin: false
  scout-sleep-seconds: 3
  dry-run: true
  max-jumps: 0
  min-notional-buffer: 1.01

backtest:
  initial-balance: 1000
  fee-pct: 0.1

api:
  address: "127.0.0.1:8080"
